<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☁SkyCast</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>Weather API Project</h1>
    <p class="subtitle">Python + Flask + OpenWeather API Key Demo</p>

    <div class="card">
      <div class="input-group">
        <label>City Name</label>
        <input type="text" id="cityInput" placeholder="e.g. Hoskote, Bangalore, London" value="Hoskote">
      </div>
      <button id="getBtn">Get Weather</button>
      <p style="font-size:11px;color:#6b7280;margin-top:10px;text-align:center;">
        API key is hidden in backend (.env) - secure way
      </p>
    </div>

    <div id="result" class="card" aria-live="polite"></div>

    <div class="welcome-card" style="font-size:12px;color:#9ca3af;line-height:1.6;">
      <h2> 🌤 Welcome </h2>
      <p>
        "Search for any city to get real-time weather information"
      </p>  
      <ul>
        <li>🌡 Current Temperature</li>
        <li>💧 Humidity</li>
        <li>🌬 Wind Speed</li>
        <li>📊 Atmospheric Pressure</li>
    </ul>
    </div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
